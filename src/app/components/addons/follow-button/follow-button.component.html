@if (currentUser?.usuario && currentUser?.usuario?.userName !== userName) {
  <main>
    @if (isFollowing) {
      <a class=" bgris unfollow_user_post" (click)="followUser(false)">
        @if (icon) {
          <fa-icon [icon]="['fas', 'eye']"></fa-icon>
          } Siguiendo
        </a>
      }
      @if (!isFollowing) {
        <a class="bverde follow_user_post" (click)="followUser(!isFollowing)">
          @if (icon) {
            <fa-icon [icon]="['fas', 'eye']"></fa-icon>
            } Seguir
          </a>
        }
      </main>
    }
