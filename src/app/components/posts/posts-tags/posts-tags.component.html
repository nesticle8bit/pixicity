<section class="tagbox">
  <div class="fortags">
    <div class="letres">Tags:</div>

    @for (etiqueta of post?.tags; track etiqueta; let last = $last) {
      <div>
        <a rel="tag" [routerLink]="['/buscar/posts/' + etiqueta]">
          {{etiqueta}}
        </a>
        @if (!last) {
          <span>|</span>
        }
      </div>
    }
  </div>
</section>
