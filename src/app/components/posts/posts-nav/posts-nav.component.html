<div class="post-nav d-none d-md-none d-lg-block">
    <a class="float-end" (click)="nextPost(post.id)" matTooltip="Post siguiente (más nuevo)">
        <i class="ti ti-caret-right"></i>
    </a>

    <a class="float-end" (click)="randomPost(post.id)" matTooltip="Post aleatorio">
        <i class="ti ti-arrows-shuffle"></i>
    </a>

    <a class="float-end" (click)="prevPost(post.id)" matTooltip="Post anterior (más viejo)">
        <i class="ti ti-caret-left"></i>
    </a>
</div>
