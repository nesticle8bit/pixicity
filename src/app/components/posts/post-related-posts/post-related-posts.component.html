<div class="rank-widget">
  <div class="rank-widget__head">
    <i class="ti ti-stack-2"></i>
    <h2>Posts Relacionados</h2>
  </div>

  @if (relatedPosts?.length < 1) {
    <div class="rank-widget__empty">
      <i class="ti ti-target-off"></i>
      Sin posts relacionados
    </div>
  } @else {
    <div class="rank-widget__list">
      @for (item of relatedPosts; track item.id; let i = $index) {
        <article class="rank-item">
          <span class="rank-item__rank" [ngClass]="{'gold': i === 0, 'silver': i === 1, 'bronze': i === 2}">
            {{i + 1}}
          </span>
          <span class="rank-item__body">
            <app-post-url-link [post]="{ id: item.id, url: item.url, titulo: item.titulo, truncate: 38}"
              [categoria]="{ icono: item.categoria.icono, nombre: item.categoria.nombre, seo: item.categoria.seo}">
            </app-post-url-link>
          </span>
          <span class="rank-item__pts" matTooltip="Puntos">
            <i class="ti ti-thumb-up"></i> {{item.puntos}}
          </span>
        </article>
      }
    </div>
  }
</div>
