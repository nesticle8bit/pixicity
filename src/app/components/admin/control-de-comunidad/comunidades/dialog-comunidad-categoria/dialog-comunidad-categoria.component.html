<h2 mat-dialog-title>{{data ? 'Actualizar' : 'Agregar'}} categoría</h2>

<form [formGroup]="formGroup" (ngSubmit)="guardar()">
  <mat-dialog-content>
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" formControlName="nombre" cdkFocusInitial />
    </div>

    <div class="mb-3">
      <label class="form-label">SEO (opcional)</label>
      <input type="text" class="form-control" formControlName="seo" placeholder="se genera del nombre si se deja vacío" />
    </div>

    <div class="mb-3">
      <label class="form-label">Orden</label>
      <input type="number" class="form-control" formControlName="orden" />
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" mat-button mat-dialog-close>Cancelar</button>
    <button type="submit" mat-button [disabled]="formGroup.invalid">Guardar</button>
  </mat-dialog-actions>
</form>
