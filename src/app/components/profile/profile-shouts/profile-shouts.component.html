<form [formGroup]="formGroup" (ngSubmit)="createShout()" class="sh-composer">
    <div class="sh-composer__avatar">
        <app-user-avatar [class]="'sh-avatar-img'" [avatar]="currentUser?.usuario?.avatar"
            [userName]="currentUser?.usuario?.userName" [width]="46" [height]="46"></app-user-avatar>
    </div>

    <div class="sh-composer__main">
        <textarea class="sh-composer__input" rows="3" formControlName="comentario"
            placeholder="¿Qué estás pensando?"></textarea>

        <div class="sh-composer__actions">
            <span class="sh-composer__hint">Comparte algo con la comunidad</span>
            <button type="submit" class="sh-btn" [disabled]="!formGroup.value.comentario">
                <i class="ti ti-send"></i> Compartir
            </button>
        </div>
    </div>
</form>

<app-profile-shouts-wall [user]="user" [load]="reloadShouts"></app-profile-shouts-wall>
