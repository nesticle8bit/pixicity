<div class="mentop">
  <div class="actualtop cursor--pointer" id="ucambi" (click)="toggleMenu()">
    @if (selection === 'ayer') {
      <span>Ayer</span>
    }
    @if (selection === 'hoy') {
      <span>Hoy</span>
    }
    @if (selection === 'ultimos7dias') {
      <span>Semana</span>
    }
    @if (selection === 'mes') {
      <span>Mes</span>
    }
    @if (selection === 'all') {
      <span>Todos</span>
    }
  </div>

  <div class="listop" [style.display]="displayMenu ? 'block' : 'none'">
    <a href="javascript:void(0)" (click)="changeTop('ayer')" class="ttayer">
      Ayer
    </a>

    <a href="javascript:void(0)" (click)="changeTop('hoy')" class="tthoy">
      Hoy
    </a>

    <a href="javascript:void(0)" (click)="changeTop('ultimos7dias')" class="ttsemana">
      Semana
    </a>

    <a href="javascript:void(0)" (click)="changeTop('mes')" class="ttmes">
      Mes
    </a>

    <a href="javascript:void(0)" (click)="changeTop('all')" class="tttodos listo">
      Todos
    </a>
  </div>
</div>
