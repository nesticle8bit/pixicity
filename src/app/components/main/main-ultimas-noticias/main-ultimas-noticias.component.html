@if (noticias.length > 0) {
  <section class="last_news container">
    <div class="row">
      @for (noticia of noticias; track noticia; let i = $index) {
        <div class="col-12">
          <strong class="hide" [class.fade-in]="i === currentIndex" [innerHTML]="noticia.contenido"></strong>
        </div>
      }
    </div>
  </section>
}
